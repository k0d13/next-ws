name: Pipeline

on:
  push:
    branches: [main]
    paths: ["package.json", "pnpm-lock.yaml", "src/**", "tests/**", "examples/**/package.json", ".github/workflows/pipeline.yml"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths: ["package.json", "pnpm-lock.yaml", "src/**", "tests/**", "examples/**/package.json", ".github/workflows/pipeline.yml"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/node

      - name: Run the type checker
        run: pnpm check

  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/node

      - name: Run the linter
        run: pnpm lint

  build:
    name: Building
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/node

      - name: Build the package
        run: pnpm build

  test:
    name: Testing
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/node

      - name: Run tests
        uses: docker://mcr.microsoft.com/playwright:v1.58.2-jammy
        with:
          args: npx playwright test

      - name: Upload test outputs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: |
            tests/.report/
            tests/.results/
          include-hidden-files: true
          retention-days: 7

  process:
    name: Processing Changesets
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/node

      - name: Process changesets
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run release:version
          publish: pnpm run release:publish
          title: "Pending Releases"
          commit: "Update changelog and release"

      - run: |
          echo "published=${{ steps.changesets.outputs.published }}" >> $GITHUB_OUTPUT

  snapshot:
    name: Releasing Snapshot
    needs: [process]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.process.outputs.published == 'false' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/node

      - name: Publish snapshot version
        run: |
          pnpm run release:snapshot:version
          pnpm run release:snapshot:publish
